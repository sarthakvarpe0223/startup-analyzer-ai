kind = "web"
previewPath = "/"
title = "Startup Analyzer AI"
version = "1.0.0"
id = "artifacts/startup-analyzer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21127

[services.development]
run = "pnpm --filter @workspace/startup-analyzer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/startup-analyzer", "run", "build" ]
publicDir = "artifacts/startup-analyzer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21127"
BASE_PATH = "/"
